# Configure Semantic Release
branches:
  - main

plugins:
  - "@semantic-release/commit-analyzer"
    - preset: "angular" # Le moteur de base
      releaseRules:
        - breaking: true
          release: "major"
        - type: "feat"
          release: "minor"
        - type: "fix"
          release: "patch"

  - "@semantic-release/release-notes-generator"
  
  # Plugin for modifying the version in the __init__.py file before committing and creating a release
  - - "@semantic-release/exec"
    - prepareCmd: "sed -i 's/__version__ = \".*\"/__version__ = \"${nextRelease.version}\"/' src/radon/__init__.py"
  
  # Plugin for committing the new version
  - - "@semantic-release/git"
    - assets:
        - "src/radon/__init__.py"
      message: "chore(release): ${nextRelease.version} [skip ci]"
  
  # Plugin for creating a GitHub release
  - "@semantic-release/github"